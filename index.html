<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Apple Pie — Gallery</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <h1><a href="#" id="site-title">A Apple Pie</a></h1>
  <div class="page-count" aria-hidden="false">1/15</div>
  </header>

  <!-- Warning overlay shown on initial load; clicking/tapping anywhere dismisses it -->
  <div id="warning-overlay" role="dialog" aria-label="Warning" aria-hidden="false">
    <img src="images/warning.png" alt="Warning" id="warning-image">
  </div>

  <!-- Inactivity modal: appears after a period of user inactivity -->
  <div id="inactivity-modal" role="dialog" aria-label="Are you still there?" aria-hidden="true">
    <div class="inactivity-content">
      <p class="inactivity-title">Are you still there?</p>
      <p class="inactivity-countdown">Continuing in <span id="inactivity-count">5</span>s</p>
      <button id="continue-viewing" class="btn-ghost">Continue viewing</button>
    </div>
  </div>

  <main>
    <section class="gallery-container" data-gallery="images/p1.png,images/p2.png,images/p3.png,images/p4.png,images/p5.png,images/p6.png,images/p7.png,images/p8.png,images/p9.png,images/p10.png,images/p11.png,images/p12.png,images/p13.png,images/p14.png,images/p15.png">
      <div class="viewer single-view">
        <button class="btn prev" aria-label="Previous">◀</button>
        <img class="main-image" src="images/p1.png" alt="Gallery image">
        <button class="btn next" aria-label="Next">▶</button>
      </div>
    </section>
  </main>

  <script src="js/gallery.js"></script>
</body>
</html>
